server:
  port: 8080

spring:
  application:
    name: core-app
  # docs/14-api-specification.md's endpoints are all snake_case JSON
  # (email, totp_code, refresh_token, expires_in, ...) — applied globally so
  # every controller's request/response records can use plain camelCase
  # Java field names without per-field @JsonProperty annotations.
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nectrix}
    username: nectrix_app
    password: ${POSTGRES_APP_PASSWORD}
  # Migrations are never run by the app itself — always an explicit, separate
  # step (the sibling `db` Gradle subproject, run as the nectrix superuser,
  # not this restricted nectrix_app role). liquibase-core isn't even on this
  # module's classpath, so LiquibaseAutoConfiguration can't activate anyway —
  # this is belt-and-braces, documenting the intent explicitly.
  liquibase:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# TICKET-010 — /actuator/prometheus is the only endpoint besides the default
# health that's exposed; actuator's full endpoint set (env, beans, heapdump,
# ...) is not something to expose by default even in this Phase-0 stub.
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health
  metrics:
    tags:
      application: ${spring.application.name}

nectrix:
  # TICKET-011 — apps/core-app/modules/crypto's EnvelopeEncryptionService.
  # endpoint-override is set only for LocalStack (local dev/CI,
  # docker-compose.yml); real AWS KMS resolves credentials via the SDK's
  # normal provider chain (IRSA in-cluster) and needs no override here at all.
  envelope-encryption:
    kms:
      region: ${AWS_REGION:us-east-1}
      endpoint-override: ${KMS_ENDPOINT_OVERRIDE:}
  # TICKET-101 follow-up — broker-account archival (ArchivalBlobStorageClient/
  # BrokerAccountArchivalOrchestrator/BrokerAccountArchivalJob). endpoint-override is set only
  # for MinIO (local dev/CI, docker-compose.yml); real production blob storage resolves
  # credentials via the SDK's normal provider chain and needs no override here at all.
  archival:
    bucket: ${ARCHIVAL_BUCKET:nectrix-archival}
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${ARCHIVAL_ENDPOINT_OVERRIDE:}
    # Unlike KMS_ENDPOINT_OVERRIDE's LocalStack target, MinIO genuinely validates credentials —
    # see ArchivalStorageProperties' own Javadoc.
    access-key: ${ARCHIVAL_ACCESS_KEY:}
    secret-key: ${ARCHIVAL_SECRET_KEY:}
    # Defaults to false — same "opt-in, no test context accidentally fires it" reasoning as
    # invitations.token-refresh.enabled below.
    enabled: ${ARCHIVAL_SWEEP_ENABLED:false}
  # TICKET-120 — signed management-agreement documents (modules:trading's own
  # AgreementDocumentStorageClient). A separate bucket/prefix from archival's — these are LIVE
  # documents a Follower fetches on demand, not deleted-account history.
  documents:
    bucket: ${DOCUMENTS_BUCKET:nectrix-documents}
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${DOCUMENTS_ENDPOINT_OVERRIDE:}
    public-endpoint-override: ${DOCUMENTS_PUBLIC_ENDPOINT_OVERRIDE:}
    access-key: ${DOCUMENTS_ACCESS_KEY:}
    secret-key: ${DOCUMENTS_SECRET_KEY:}
    # 90 days, expressed in seconds — how long a broker account must have sat DISCONNECTED
    # before the scheduled sweep archives and deletes it.
    stale-after-seconds: ${ARCHIVAL_STALE_AFTER_SECONDS:7776000}
    # Daily sweep cadence, expressed in seconds — a cheap no-op most days.
    sweep-interval-seconds: ${ARCHIVAL_SWEEP_INTERVAL_SECONDS:86400}
  # TICKET-005 (Auth & Identity Service)
  auth:
    jwt:
      secret: ${JWT_SIGNING_SECRET}
    two-factor:
      issuer: Nectrix
    rate-limit:
      # No numeric threshold specified in the design docs — OWASP-aligned default.
      max-attempts: 5
      window-seconds: 900
    oauth:
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: http://localhost:8080/api/v1/auth/oauth/google/callback
      apple:
        # Implemented but NOT end-to-end tested against Apple's real servers —
        # documented gap, see apps/core-app/README.md.
        client-id: ${APPLE_OAUTH_CLIENT_ID:}
        client-secret: ${APPLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: http://localhost:8080/api/v1/auth/oauth/apple/callback
  # TICKET-101 — internal-only shared-secret header, checked by SecurityConfig's
  # second, /internal/**-scoped SecurityFilterChain. Same value as
  # nectrix.invitations.broker-adapters.service-token below (both resolve
  # INTERNAL_SERVICE_TOKEN) — Go and Java authenticate to each other with it.
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}
    # Nectrix-hosted MT5/MT4 terminal-provisioning — a separate secret from
    # service-token above, checked by its own, narrower SecurityFilterChain
    # (SecurityConfig#internalMtTerminalCredentialsFilterChain). Only
    # apps/mt-terminal-host holds this value.
    mt-terminal-provisioner-token: ${MT_TERMINAL_PROVISIONER_TOKEN:}
  # TICKET-101 (cTrader Broker Adapter) — real broker linking.
  invitations:
    ctrader-oauth:
      client-id: ${CTRADER_CLIENT_ID:}
      client-secret: ${CTRADER_CLIENT_SECRET:}
      # Must be an EXACT match of the redirect URI registered with the Spotware app
      # behind CTRADER_CLIENT_ID (Spotware rejects mismatches) — real environments
      # need a real public callback URL, not localhost.
      redirect-uri: ${CTRADER_REDIRECT_URI:http://localhost:8080/api/v1/broker/ctrader/callback}
    broker-adapters:
      internal-base-url: ${BROKER_ADAPTERS_INTERNAL_BASE_URL:http://localhost:8091}
      service-token: ${INTERNAL_SERVICE_TOKEN}
    token-refresh:
      # Defaults to false — see InvitationsProperties.TokenRefresh's Javadoc for why
      # (no per-test Spring profile in this codebase; real deployments opt in via
      # TOKEN_REFRESH_ENABLED=true, deploy/base/core-app).
      enabled: ${TOKEN_REFRESH_ENABLED:false}
      # Placeholders — cTrader's real access-token TTL wasn't confirmed against a
      # live account during this ticket (see the live-verification runbook).
      # Hourly poll, refresh once under 24h remains.
      interval-seconds: 3600
      refresh-before-expiry-seconds: 86400
    # TICKET-102 (MT5/MT4 EA-bridge) — the user's own terminal dials this address directly, so it
    # must be reachable from outside the cluster, unlike broker-adapters.internal-base-url above.
    mt-bridge:
      gateway-url: ${MT_BRIDGE_GATEWAY_URL:ws://localhost:8092/ea/ws}
      # TICKET-110 — cluster-internal snapshot/positions passthrough, mirrors
      # broker-adapters.internal-base-url above.
      internal-base-url: ${MT5_BRIDGE_GATEWAY_INTERNAL_BASE_URL:http://localhost:8092}
      service-token: ${INTERNAL_SERVICE_TOKEN}
    # TICKET-118 — the invited Follower's own link points back at apps/web's
    # /accept-invite route; InvitationService appends ?token=<raw-token>.
    accept-url-base: ${INVITATION_ACCEPT_URL_BASE:http://localhost:3000/accept-invite}
  # TICKET-113 (Performance Fee Engine) — docs/11-fee-engine-billing.md §11.7's global-default take
  # rate; Stripe credentials for the STRIPE_INVOICE collection path only (Option A).
  billing:
    platform-take-rate-pct: ${PLATFORM_TAKE_RATE_PCT:15.00}
    stripe:
      api-key: ${STRIPE_API_KEY:}
      webhook-signing-secret: ${STRIPE_WEBHOOK_SIGNING_SECRET:}
    # TICKET-114 — self-serve registration's Stripe Checkout Session config. success/cancel-url
    # point back at apps/web; prices map SubscriptionPlans' static catalog codes to real Stripe
    # Price ids (empty in dev/test, where Stripe calls are statically mocked).
    subscriptions:
      success-url: ${SUBSCRIPTION_CHECKOUT_SUCCESS_URL:http://localhost:3000/broker-accounts?subscribed=1}
      cancel-url: ${SUBSCRIPTION_CHECKOUT_CANCEL_URL:http://localhost:3000/register}
      prices:
        starter: ${STRIPE_PRICE_STARTER:}
        individual: ${STRIPE_PRICE_INDIVIDUAL:}
        pro: ${STRIPE_PRICE_PRO:}
  # TICKET-115 (Core Notifications) — push/email provider config, empty in dev/test (both senders
  # treat a blank value as "delivery for this channel is a no-op," not a startup failure).
  notifications:
    firebase:
      service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
    ses:
      region: ${SES_REGION:}
      sender-email: ${SES_SENDER_EMAIL:}
    # TICKET-118 — local/dev-only escape hatch (see SesEmailSender's own Javadoc): when set,
    # bypasses real SES and POSTs to the webhook-catcher dev container's /email route instead.
    # Empty in every real deployment (prod/CI never set LOCAL_EMAIL_CATCHER_URL).
    local-email-catcher:
      url: ${LOCAL_EMAIL_CATCHER_URL:}
