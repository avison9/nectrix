server:
  port: 8080

spring:
  application:
    name: core-app
  # docs/14-api-specification.md's endpoints are all snake_case JSON
  # (email, totp_code, refresh_token, expires_in, ...) — applied globally so
  # every controller's request/response records can use plain camelCase
  # Java field names without per-field @JsonProperty annotations.
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nectrix}
    username: nectrix_app
    password: ${POSTGRES_APP_PASSWORD}
  # Migrations are never run by the app itself — always an explicit, separate
  # step (the sibling `db` Gradle subproject, run as the nectrix superuser,
  # not this restricted nectrix_app role). liquibase-core isn't even on this
  # module's classpath, so LiquibaseAutoConfiguration can't activate anyway —
  # this is belt-and-braces, documenting the intent explicitly.
  liquibase:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# TICKET-010 — /actuator/prometheus is the only endpoint besides the default
# health that's exposed; actuator's full endpoint set (env, beans, heapdump,
# ...) is not something to expose by default even in this Phase-0 stub.
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health
  metrics:
    tags:
      application: ${spring.application.name}

# TICKET-005 (Auth & Identity Service)
nectrix:
  auth:
    jwt:
      secret: ${JWT_SIGNING_SECRET}
    two-factor:
      # TEMPORARY stub AES-GCM key — TICKET-011's real KMS-backed envelope
      # encryption replaces this wholesale, see TwoFactorSecretCipher.
      encryption-key: ${TWO_FACTOR_SECRET_ENCRYPTION_KEY}
      issuer: Nectrix
    rate-limit:
      # No numeric threshold specified in the design docs — OWASP-aligned default.
      max-attempts: 5
      window-seconds: 900
    oauth:
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: http://localhost:8080/api/v1/auth/oauth/google/callback
      apple:
        # Implemented but NOT end-to-end tested against Apple's real servers —
        # documented gap, see apps/core-app/README.md.
        client-id: ${APPLE_OAUTH_CLIENT_ID:}
        client-secret: ${APPLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: http://localhost:8080/api/v1/auth/oauth/apple/callback
