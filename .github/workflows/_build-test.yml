name: Build & Test (reusable)

on:
  workflow_call:
    inputs:
      run-core-app:
        type: boolean
        default: true
      run-go-apps:
        type: boolean
        default: true
      run-ts-apps:
        type: boolean
        default: true

jobs:
  core-app:
    if: inputs.run-core-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build + test core-app (includes ArchUnit boundary tests)
        working-directory: apps/core-app
        run: ./gradlew build

  go-apps:
    # Deliberately no job-level `if:` here — a matrix only expands into its
    # per-leg check-run names (e.g. "go-apps (apps/copy-engine, copy-engine)")
    # once the job actually starts. A job-level `if: false` skips before that
    # expansion, reporting one unexpanded "go-apps" check instead of the 5
    # matrix-leg names branch protection's required-status-checks expects —
    # those 5 required checks would then never report and block merges
    # forever. Gating each step instead keeps the matrix always expanding
    # into the same 5 named checks, whether or not there's real work to do.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - { dir: packages/go-domain, name: go-domain }
          - { dir: packages/event-contracts/go, name: event-contracts-go }
          - { dir: apps/copy-engine, name: copy-engine }
          - { dir: apps/broker-adapters, name: broker-adapters }
          - { dir: apps/mt5-bridge-gateway, name: mt5-bridge-gateway }
    steps:
      - if: inputs.run-go-apps
        uses: actions/checkout@v4
      - if: inputs.run-go-apps
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"
      - name: Build (mirrors make go-build)
        if: inputs.run-go-apps
        working-directory: ${{ matrix.module.dir }}
        run: go build -o /dev/null ./...
      - name: Test (mirrors make go-test)
        if: inputs.run-go-apps
        working-directory: ${{ matrix.module.dir }}
        run: go test ./...
      - if: inputs.run-go-apps
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ matrix.module.dir }}
          version: latest

  ts-apps:
    if: inputs.run-ts-apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build (mirrors make ts-build)
        run: npx turbo run build
      - name: Lint (mirrors make ts-lint)
        run: npx turbo run lint
