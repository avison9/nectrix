name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: avison9/nectrix

jobs:
  build-test:
    uses: ./.github/workflows/_build-test.yml
    with:
      run-core-app: true
      run-go-apps: true
      run-ts-apps: true

  integration-test:
    needs: [build-test]
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-throwaway-password
      POSTGRES_APP_PASSWORD: ci-throwaway-app-password
      MINIO_ROOT_PASSWORD: ci-throwaway-password
      # TICKET-005 — no default in application.yml (deliberately, so a forgotten
      # secret fails loudly in real environments), so CI needs its own throwaway
      # values. GOOGLE_OAUTH_*/APPLE_OAUTH_* are left unset — application.yml
      # defaults those to empty strings, and no test here exercises real OAuth.
      # JWT_SIGNING_SECRET must be valid base64 decoding to >=32 bytes
      # (JwtService's requirement) — freshly generated via `openssl rand
      # -base64 N`, not a secret reused anywhere real.
      JWT_SIGNING_SECRET: "n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ=="
      # TICKET-011 — LocalStack accepts any dummy AWS credentials; the SDK
      # only requires *something* resolvable (see AwsEnvelopeKmsClient).
      AWS_REGION: us-east-1
      KMS_ENDPOINT_OVERRIDE: http://localhost:4566
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Start ephemeral infra (Postgres, Redis, Kafka, LocalStack)
        run: docker compose -f docker-compose.yml up -d --wait postgres redis kafka localstack
      - name: Create Kafka topic catalog (TICKET-007)
        run: ./infra/kafka/create-topics.sh
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Run database migrations (TICKET-004)
        working-directory: apps/core-app
        run: ./gradlew :db:update
      - name: Create the envelope-encryption KMS key in LocalStack (TICKET-011)
        run: ./infra/localstack/init-kms.sh
      - name: core-app infra connectivity + schema/audit-log + auth (TICKET-005) + envelope-encryption (TICKET-011) integration tests
        working-directory: apps/core-app
        run: ./gradlew integrationTest
      - name: event-contracts/java Kafka producer/consumer + DLQ integration tests (TICKET-007)
        working-directory: packages/event-contracts/java
        run: ./gradlew integrationTest
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.4"
          # copy-engine/broker-adapters/mt5-bridge-gateway have no go.sum (no
          # external deps beyond stdlib and local go.work-linked packages);
          # event-contracts/go does have real external deps (TICKET-007) but
          # is a small, single additional module — not worth a separate cache
          # key for this loop.
          cache: false
      - name: Go services infra connectivity smoke test + event-contracts Kafka producer/consumer + DLQ tests (TICKET-007)
        # apps/mt-terminal-host is deliberately NOT in this loop: its own
        # -tags=integration tests need a real Kubernetes cluster (KUBECONFIG
        # pointed at one), not this job's Postgres/Redis/Kafka-only ephemeral
        # infra — proven separately, for real, via `make kind-mt-terminal-host-test`
        # (infra/kind/mt-terminal-host-test/run.sh), the same
        # host-tools-only pattern kind-netpol-test/kind-hpa-test already use
        # (see infra/kind/README.md) rather than wired into this job.
        run: |
          for d in apps/copy-engine apps/broker-adapters apps/mt5-bridge-gateway packages/event-contracts/go; do
            (cd "$d" && go test -tags=integration ./...)
          done
      - name: Tear down infra
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # Single source of truth for "which cloud, if any, is active" — resolves to
  # a real image-reference prefix deploy-staging/deploy-production actually
  # pull from. Defaults to GHCR when vars.CLOUD_PROVIDER is unset (today).
  # Kept as its own job (not duplicated inline) so build-scan-push's mirror
  # push and both deploy jobs all key off exactly one value, never two
  # independent checks that could both fire at once.
  resolve-registry:
    needs: [integration-test]
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.resolve.outputs.image_prefix }}
    steps:
      - id: resolve
        run: |
          case "${{ vars.CLOUD_PROVIDER }}" in
            aws) echo "image_prefix=${{ vars.AWS_ECR_REGISTRY }}/nectrix" >> "$GITHUB_OUTPUT" ;;
            gcp) echo "image_prefix=${{ vars.GCP_ARTIFACT_REGISTRY_URL }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "image_prefix=ghcr.io/avison9/nectrix" >> "$GITHUB_OUTPUT" ;;
          esac

  build-scan-push:
    needs: [integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for the ECR/Artifact Registry OIDC/WIF steps below — unused (no-op) until those repo variables exist
    strategy:
      # fail-fast (the default) cancels sibling matrix legs the instant one
      # leg fails, which was masking the real per-app error behind a generic
      # "operation was canceled" on every leg. Disabled so each app's
      # build/scan runs to real completion independently.
      fail-fast: false
      matrix:
        app:
          - { name: core-app, dockerfile: apps/core-app/Dockerfile }
          - { name: copy-engine, dockerfile: apps/copy-engine/Dockerfile }
          - { name: broker-adapters, dockerfile: apps/broker-adapters/Dockerfile }
          - { name: mt5-bridge-gateway, dockerfile: apps/mt5-bridge-gateway/Dockerfile }
          - { name: mt-terminal-host, dockerfile: apps/mt-terminal-host/Dockerfile }
          # The Wine/terminal image (apps/mt-terminal-host/terminal-image/) — real,
          # live-verified working as of a real CI run (all install/compile/scan/push
          # stages passed for real; see apps/mt-terminal-host/README.md's "Real,
          # in-progress terminal-image debugging" section for the full history).
          # Previously workflow_dispatch-only (build-terminal-image.yml, now
          # removed) while genuinely unverified; folded into this always-on matrix
          # now that it's proven, per the original TICKET-102 plan's CI wiring
          # intent. Slower than every other leg here (~3 real minutes: Wine setup +
          # two MetaQuotes installs + a real MetaEditor compile), but fail-fast:
          # false means it never blocks the other legs.
          - { name: mt-terminal-image, dockerfile: apps/mt-terminal-host/terminal-image/Dockerfile }
          - { name: admin-portal, dockerfile: apps/admin-portal/Dockerfile }
          # TICKET-110 — apps/web (the follower/master-facing broker-linking
          # app) had no Dockerfile/image at all until this ticket; it only
          # ever ran via `next dev`.
          - { name: web, dockerfile: apps/web/Dockerfile }
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Push (only reached if Trivy passed)
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}

      # mt-terminal-image only: if the build above failed, the
      # install-diagnostics stage (which never fails itself — see
      # install-with-diagnostics.sh's own header) still has a usable, cached
      # layer carrying real screenshots/exit codes/stdout+stderr from
      # whatever the Wine installer was doing at the moment it failed — a GUI
      # installer's own error dialog is otherwise invisible to this job's
      # text-only build log above. Ported from the now-removed
      # build-terminal-image.yml (see apps/mt-terminal-host/README.md's "Real,
      # in-progress terminal-image debugging" section for the history this
      # capability made possible) rather than dropped when that workflow was
      # folded into this always-on matrix — this Dockerfile is meaningfully
      # more fragile than every other leg here (Wine + an external MetaQuotes
      # CDN dependency + a real GUI installer under Xvfb), so losing this on
      # the next real failure would be a real regression, not a cleanup.
      - name: mt-terminal-image — on failure, export install diagnostics (screenshots, exit codes, logs)
        if: failure() && matrix.app.name == 'mt-terminal-image'
        run: |
          docker buildx build \
            --target diagnostics-export \
            --file apps/mt-terminal-host/terminal-image/Dockerfile \
            --cache-from type=gha,scope=mt-terminal-image \
            -o type=local,dest=/tmp/mt-terminal-diagnostics \
            . || true
      - name: mt-terminal-image — on failure, upload install diagnostics artifact
        if: failure() && matrix.app.name == 'mt-terminal-image'
        uses: actions/upload-artifact@v4
        with:
          name: mt-terminal-install-diagnostics
          path: /tmp/mt-terminal-diagnostics
          if-no-files-found: warn
          retention-days: 14

      # --- Cloud-native registry mirror (infra/terraform/{aws,gcp}/modules/{ecr,artifact-registry}) ---
      # Mutually exclusive on vars.CLOUD_PROVIDER (set once a cloud is chosen
      # for real — see infra/terraform/README.md's "Container registry"
      # section) — not two independent existence checks, so at most one of
      # these fires per run, never both. Unset today (no real cloud account
      # exists yet), so both are no-ops and this pipeline's status is
      # unaffected.
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Push to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }} # e.g. <account-id>.dkr.ecr.<region>.amazonaws.com — from the ecr module's repository_urls output
        run: |
          aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}" "$ECR_REGISTRY/nectrix/${{ matrix.app.name }}:${{ github.sha }}"
          docker push "$ECR_REGISTRY/nectrix/${{ matrix.app.name }}:${{ github.sha }}"

      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}

      - name: Push to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        env:
          AR_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_URL }} # e.g. <region>-docker.pkg.dev/<project>/nectrix — from the artifact-registry module's repository_url output
        run: |
          gcloud auth configure-docker "$(echo "$AR_REPOSITORY" | cut -d/ -f1)" --quiet
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}" "$AR_REPOSITORY/${{ matrix.app.name }}:${{ github.sha }}"
          docker push "$AR_REPOSITORY/${{ matrix.app.name }}:${{ github.sha }}"

  # --- dev: the nectrix-dev VM (infra/terraform/gcp-dev) — unlike
  # staging/production's ephemeral-per-run kind cluster, this is a real,
  # persistent environment, so its migration step (unlike db-migration-
  # staging's placeholder below) genuinely runs against a real, persistent
  # Postgres. No-op (skipped, not failed) until vars.GCP_DEV_VM_NAME is set —
  # see infra/terraform/gcp-dev/README.md's credentials/manual-steps list.
  # Runs BEFORE db-migration-dev/deploy-dev deliberately — a real, live
  # failure the first time this pipeline ran for real: db-migration-dev tried
  # to connect to the VM's Postgres before anything had ever started it
  # (docker-compose only used to get brought up as part of deploy-dev, which
  # itself only runs AFTER db-migration-dev succeeds — a chicken-and-egg
  # ordering bug). Bringing the compose stack up first, in its own job, fixes
  # it for both the first-ever deploy and every one after (docker compose up
  # is idempotent — a no-op restart if nothing changed).
  provision-dev-host-services:
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    if: vars.GCP_DEV_VM_NAME != ''
    permissions:
      contents: read
      id-token: write # for the WIF auth step below
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SERVICE_ACCOUNT }}
      - name: Copy infra/gcp-dev-vm to the VM
        # A single tarball, not `gcloud compute scp --recurse` — real, live
        # failure the first time this ran with OS Login enabled (see
        # modules/vm's enable-oslogin note): recursive scp crashes gcloud
        # itself ("gcloud crashed (TypeError): quote_from_bytes() expected
        # bytes"), a known client-side bug in how it builds the recursive
        # copy's OS-Login-derived remote path. A single non-recursive file
        # transfer avoids that code path entirely.
        run: |
          tar czf /tmp/gcp-dev-vm.tar.gz -C infra gcp-dev-vm
          gcloud compute scp --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" \
            /tmp/gcp-dev-vm.tar.gz "${{ vars.GCP_DEV_VM_NAME }}:/tmp/gcp-dev-vm.tar.gz"
          gcloud compute ssh --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" "${{ vars.GCP_DEV_VM_NAME }}" --command="
            set -euo pipefail
            sudo rm -rf /opt/nectrix-dev-vm/compose
            sudo mkdir -p /opt/nectrix-dev-vm/compose
            sudo tar xzf /tmp/gcp-dev-vm.tar.gz -C /opt/nectrix-dev-vm/compose --strip-components=1
            rm /tmp/gcp-dev-vm.tar.gz
          "
      - name: Bring up the docker-compose stateful-services stack
        # /opt/nectrix-dev-vm is root-owned (created by the startup script,
        # which runs as root — see modules/vm/startup.sh) and this job's
        # OS-Login user isn't in the docker group (only whichever user
        # `logname` resolved to at boot time got added there) — sudo
        # throughout, and `sudo tee -a` rather than `cat >>` since a plain
        # `>>` redirect happens in the invoking (non-root) shell before sudo
        # ever runs, not inside the sudo'd process.
        run: |
          gcloud compute ssh --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" "${{ vars.GCP_DEV_VM_NAME }}" --command="
            set -euo pipefail
            cd /opt/nectrix-dev-vm/compose
            sudo bash render-node-ip.sh
            sudo tee -a .env >/dev/null <<EOF
          POSTGRES_PASSWORD=${{ secrets.DEV_POSTGRES_PASSWORD }}
          POSTGRES_APP_PASSWORD=${{ secrets.DEV_POSTGRES_APP_PASSWORD }}
          MINIO_ROOT_PASSWORD=${{ secrets.DEV_MINIO_ROOT_PASSWORD }}
          EOF
            sudo docker compose -f docker-compose.yml pull
            sudo docker compose -f docker-compose.yml up -d --wait
          "

  db-migration-dev:
    needs: [provision-dev-host-services]
    runs-on: ubuntu-latest
    if: vars.GCP_DEV_VM_NAME != ''
    permissions:
      contents: read
      id-token: write # for the WIF auth step below
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SERVICE_ACCOUNT }}
      # Runs ./gradlew :db:update on THIS runner (which already has the full
      # repo checkout + Java/Gradle, same as the integration-test job above),
      # tunneled to the VM's docker-compose Postgres over IAP (now guaranteed
      # up by provision-dev-host-services above) — not on the VM itself, so
      # the VM never needs a Gradle/full-source checkout of its own (its
      # Java/Go/Python install, see modules/vm/startup.sh, is for ad hoc
      # operator debugging only).
      - name: Open IAP tunnel to the VM's Postgres
        # The wait-loop used to have no failure check at all — a real gap
        # that masked the actual root cause the first time this failed for
        # real (the tunnel silently never came up because the firewall only
        # allowed the IAP range on port 22, not 5432 — see
        # infra/terraform/gcp-dev/modules/vm's allow_iap rule); the step
        # reported success regardless and Liquibase just hit a bare
        # "connection refused" later with no clue why. Failing loudly here
        # instead if the tunnel genuinely never opens.
        run: |
          gcloud compute start-iap-tunnel "${{ vars.GCP_DEV_VM_NAME }}" 5432 \
            --local-host-port=localhost:5432 \
            --zone="${{ vars.GCP_DEV_VM_ZONE }}" &
          connected=false
          for _ in $(seq 1 20); do
            if (echo > /dev/tcp/localhost/5432) 2>/dev/null; then
              connected=true
              break
            fi
            sleep 1
          done
          if [ "$connected" != "true" ]; then
            echo "::error::IAP tunnel to the VM's Postgres never came up after 20s"
            exit 1
          fi
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: core-app db:update against the real dev Postgres
        working-directory: apps/core-app
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: nectrix
          POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          POSTGRES_APP_PASSWORD: ${{ secrets.DEV_POSTGRES_APP_PASSWORD }}
          POSTGRES_DB: nectrix
        run: ./gradlew :db:update

  db-migration-staging:
    # Same "must come after the previous tier" chain deploy-production's own
    # needs: [deploy-staging] already enforces — mirrored one tier down.
    # deploy-dev must succeed before this proceeds. The `if:` checks
    # vars.GCP_DEV_VM_NAME directly (not needs.deploy-dev.result == 'skipped')
    # deliberately — deploy-dev's result is ALSO 'skipped' when it's skipped
    # because db-migration-dev genuinely failed upstream (GitHub Actions'
    # default skip-on-failed-dependency behavior), which a bare
    # result=='skipped' check can't tell apart from "dev isn't configured
    # yet" — a real gap caught live the first time db-migration-dev actually
    # failed (a real Postgres-not-up-yet bug) and staging proceeded anyway.
    # Checking the var directly closes that hole: only an unset
    # GCP_DEV_VM_NAME counts as "intentionally not configured", every other
    # non-success result genuinely blocks.
    needs: [deploy-dev]
    if: always() && (needs.deploy-dev.result == 'success' || vars.GCP_DEV_VM_NAME == '')
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::The migration framework now exists (TICKET-004, apps/core-app/db, Liquibase)"
          echo "and is exercised for real in the integration-test job above, against the ephemeral"
          echo "CI Postgres. This stage is still a placeholder because there is no real, persistent"
          echo "staging Postgres to run against yet - TICKET-003 deliberately never applied real"
          echo "cloud infrastructure (see infra/terraform/README.md). Once one exists, this becomes"
          echo "./gradlew :db:update against the real staging DATABASE_URL, before the app"
          echo "deployment step below - per docs/16-deployment-architecture.md §16.3."

  # dev's single VM (see infra/terraform/gcp-dev) genuinely persists state
  # across deploys (unlike staging/production's fresh-kind-cluster-per-run),
  # so this pulls the just-built images from Artifact Registry, applies
  # deploy/overlays/dev via kubectl on the VM's own k3s, and refreshes the
  # docker-compose stateful-services stack — all over one IAP-tunneled SSH
  # session, never a public port. No-op until vars.GCP_DEV_VM_NAME is set —
  # same gate as db-migration-dev above.
  deploy-dev:
    needs: [db-migration-dev, resolve-registry, build-scan-push]
    runs-on: ubuntu-latest
    if: vars.GCP_DEV_VM_NAME != ''
    permissions:
      contents: read
      id-token: write # for the WIF auth step below
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SERVICE_ACCOUNT }}
      - name: Install kustomize
        run: |
          mkdir -p /tmp/kustomize-bin
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.1 /tmp/kustomize-bin
          echo "/tmp/kustomize-bin" >> "$GITHUB_PATH"
      - name: Patch image tags into the dev overlay
        # Same explicit oldName=newName:tag form as deploy-staging's
        # identical step, now genuinely exercising the Artifact Registry path
        # (see infra/terraform/gcp-dev/modules/artifact-registry) rather than
        # the CLOUD_PROVIDER-unset GHCR default.
        working-directory: deploy/overlays/dev
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal web; do
            kustomize edit set image "ghcr.io/avison9/nectrix/$app=${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}"
          done
      # --- Fallback, commented out: if the $300 credit runs out before a GCP
      # startup-credit grant comes through, unset vars.CLOUD_PROVIDER (falls
      # build-scan-push/resolve-registry back to GHCR automatically) and swap
      # the block above for this one instead, after making the GHCR packages
      # public (Settings -> Packages, per package) so the VM's k3s node can
      # pull without an imagePullSecret:
      #
      # working-directory: deploy/overlays/dev
      # run: |
      #   for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal web; do
      #     kustomize edit set image "ghcr.io/avison9/nectrix/$app=ghcr.io/avison9/nectrix/$app:${{ github.sha }}"
      #   done
      - name: Render the dev overlay + copy it to the VM
        # NODE_INTERNAL_IP_REPLACED_BY_CI (deploy/overlays/dev/host-services'
        # Endpoints objects) is a stable value — infra/terraform/gcp-dev's own
        # vm_internal_ip output, set once as the GCP_DEV_VM_INTERNAL_IP repo
        # variable — substituted here the same REPLACED_BY_CI-sentinel way
        # deploy-staging patches TERMINAL_IMAGE. The docker-compose stack
        # itself (infra/gcp-dev-vm) is already up by now — see
        # provision-dev-host-services above, which runs before
        # db-migration-dev/this job specifically so migrations have a real
        # Postgres to connect to.
        run: |
          kubectl kustomize deploy/overlays/dev > /tmp/dev-overlay-rendered.yaml
          sed -i "s|NODE_INTERNAL_IP_REPLACED_BY_CI|${{ vars.GCP_DEV_VM_INTERNAL_IP }}|g" /tmp/dev-overlay-rendered.yaml
          # /tmp on the remote, not /opt/nectrix-dev-vm — that directory is
          # root-owned (mode 755, see provision-dev-host-services' identical
          # note) and gcloud compute scp's single-file transfer has no sudo
          # mechanism of its own to write there directly.
          gcloud compute scp --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" \
            /tmp/dev-overlay-rendered.yaml "${{ vars.GCP_DEV_VM_NAME }}:/tmp/dev-overlay-rendered.yaml"
      - name: Create/refresh namespaces + secrets, apply the rendered manifest
        # Real, stable secret values (unlike deploy-staging's throwaway
        # ones) — this environment persists, so JWT_SIGNING_SECRET etc must
        # stay byte-for-byte identical across deploys or existing sessions
        # break. Built as a real script file and scp'd over, not inlined into
        # `gcloud compute ssh --command="..."` — that got genuinely
        # unmaintainable once this needed a shell function with a jsonpath
        # filter (nested single/double quotes plus parens inside an already
        # double-quoted --command string is exactly the kind of thing
        # shellcheck rightly flags as unparseable). GitHub still substitutes
        # every ${{ }} below before bash ever sees the file — same secret
        # handling as before, just written as a normal script.
        run: |
          cat > /tmp/deploy-dev.sh <<'DEPLOY_SCRIPT'
          set -euo pipefail
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          # kubectl rollout status is NOT used to verify deployments below —
          # a real false-negative caught live: unlike deploy-staging's
          # always-fresh ephemeral kind cluster, this environment persists
          # across deploys, so a Deployment can carry a STALE
          # ProgressDeadlineExceeded Progressing-condition reason from a
          # PRIOR failed rollout. kubectl rollout status treats that reason
          # as immediately fatal and exits without waiting to see whether the
          # rollout that just landed actually fixes it — even though it does,
          # seconds later. Polling the real Available condition directly
          # instead sidesteps that quirk entirely.
          wait_for_deployment() {
            ns=$1; name=$2; deadline=$((SECONDS + 180))
            while [ $SECONDS -lt $deadline ]; do
              cond=$(sudo -E kubectl get deployment "$name" -n "$ns" -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || true)
              if [ "$cond" = "True" ]; then
                echo "$name -n $ns: Available"
                return 0
              fi
              sleep 5
            done
            echo "::error::$name -n $ns never became Available within 180s"
            sudo -E kubectl get pods -n "$ns"
            sudo -E kubectl describe deployment "$name" -n "$ns"
            return 1
          }

          sudo -E kubectl create namespace core-app --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create secret generic core-app-secrets -n core-app \
            --from-literal=jwt-signing-secret='DEPLOY_SCRIPT_JWT_SIGNING_SECRET' \
            --from-literal=internal-service-token='DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN' \
            --from-literal=mt-terminal-provisioner-token='DEPLOY_SCRIPT_MT_TERMINAL_PROVISIONER_TOKEN' \
            --from-literal=postgres-app-password='DEPLOY_SCRIPT_POSTGRES_APP_PASSWORD' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create namespace admin-portal --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create secret generic admin-portal-secrets -n admin-portal \
            --from-literal=jwt-signing-secret='DEPLOY_SCRIPT_JWT_SIGNING_SECRET' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create namespace web --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create secret generic web-secrets -n web \
            --from-literal=jwt-signing-secret='DEPLOY_SCRIPT_JWT_SIGNING_SECRET' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create namespace copy-engine --dry-run=client -o yaml | sudo -E kubectl apply -f -
          sudo -E kubectl create secret generic copy-engine-secrets -n copy-engine \
            --from-literal=internal-service-token='DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN' \
            --from-literal=postgres-app-password='DEPLOY_SCRIPT_POSTGRES_APP_PASSWORD' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          # ctrader-client-id/secret: real values if you've set
          # DEV_CTRADER_CLIENT_ID/SECRET, otherwise the same placeholder
          # deploy-staging already uses — broker-adapters' main.go
          # log.Fatalf's on an empty value (a real, live crash-loop the first
          # time this deployed for real, not a soft-fail like the README's
          # original "cTrader linking just won't work" assumed).
          sudo -E kubectl create secret generic broker-adapters-secrets -n copy-engine \
            --from-literal=internal-service-token='DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN' \
            --from-literal=ctrader-client-id='DEPLOY_SCRIPT_CTRADER_CLIENT_ID' \
            --from-literal=ctrader-client-secret='DEPLOY_SCRIPT_CTRADER_CLIENT_SECRET' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          # Missing entirely until now — a real gap, not a deliberate
          # omission (deploy-staging/production both already create these;
          # this job just never had them copied in).
          sudo -E kubectl create secret generic mt5-bridge-gateway-secrets -n copy-engine \
            --from-literal=internal-service-token='DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          # No separate namespace/ServiceAccount/Role/RoleBinding apply here,
          # unlike deploy-staging's equivalent block — those are files on the
          # RUNNER's own checkout, which this SSH session has no access to (a
          # real bug caught before it ever ran: the VM only ever receives the
          # single rendered overlay file, and
          # deploy/base/mt-terminal-host/kustomization.yaml already lists its
          # own serviceaccount.yaml/role.yaml/rolebinding.yaml as resources,
          # so kubectl apply -f the rendered manifest below covers all of it
          # already, confirmed against a real render).
          sudo -E kubectl create secret generic mt-terminal-host-secrets -n copy-engine \
            --from-literal=internal-service-token='DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN' \
            --from-literal=mt-terminal-provisioner-token='DEPLOY_SCRIPT_MT_TERMINAL_PROVISIONER_TOKEN' \
            --dry-run=client -o yaml | sudo -E kubectl apply -f -
          # k3s has no built-in Artifact-Registry credential integration
          # (unlike GKE) — a real imagePullSecret, minted here from the VM's
          # OWN attached service account via the metadata server directly (no
          # gcloud CLI installed, and no token ever transits the GitHub
          # Actions log/command line this way). Short-lived (~1hr), refreshed
          # on every deploy-dev run.
          AR_TOKEN=$(curl -s -H 'Metadata-Flavor: Google' 'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          for ns in core-app copy-engine admin-portal web; do
            sudo -E kubectl create secret docker-registry artifact-registry-pull -n "$ns" \
              --docker-server=europe-west1-docker.pkg.dev \
              --docker-username=oauth2accesstoken \
              --docker-password="$AR_TOKEN" \
              --dry-run=client -o yaml | sudo -E kubectl apply -f -
          done
          sudo -E kubectl apply -f /tmp/dev-overlay-rendered.yaml
          wait_for_deployment core-app core-app
          wait_for_deployment web web
          wait_for_deployment admin-portal admin-portal
          wait_for_deployment copy-engine copy-engine
          wait_for_deployment copy-engine broker-adapters
          wait_for_deployment copy-engine mt5-bridge-gateway
          wait_for_deployment copy-engine mt-terminal-host
          DEPLOY_SCRIPT
          # Real secret values substituted here (not inside the heredoc
          # above, which is deliberately 'quoted' so $ and other shell
          # metacharacters in secret values can't be misinterpreted) via a
          # plain sed pass — same secrets this step already used, just moved
          # out of the inline --command string.
          sed -i \
            -e "s|DEPLOY_SCRIPT_JWT_SIGNING_SECRET|${{ secrets.DEV_JWT_SIGNING_SECRET }}|g" \
            -e "s|DEPLOY_SCRIPT_INTERNAL_SERVICE_TOKEN|${{ secrets.DEV_INTERNAL_SERVICE_TOKEN }}|g" \
            -e "s|DEPLOY_SCRIPT_MT_TERMINAL_PROVISIONER_TOKEN|${{ secrets.DEV_MT_TERMINAL_PROVISIONER_TOKEN }}|g" \
            -e "s|DEPLOY_SCRIPT_POSTGRES_APP_PASSWORD|${{ secrets.DEV_POSTGRES_APP_PASSWORD }}|g" \
            -e "s|DEPLOY_SCRIPT_CTRADER_CLIENT_ID|${{ secrets.DEV_CTRADER_CLIENT_ID != '' && secrets.DEV_CTRADER_CLIENT_ID || 'dev-placeholder-client-id' }}|g" \
            -e "s|DEPLOY_SCRIPT_CTRADER_CLIENT_SECRET|${{ secrets.DEV_CTRADER_CLIENT_SECRET != '' && secrets.DEV_CTRADER_CLIENT_SECRET || 'dev-placeholder-client-secret' }}|g" \
            /tmp/deploy-dev.sh
          gcloud compute scp --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" \
            /tmp/deploy-dev.sh "${{ vars.GCP_DEV_VM_NAME }}:/tmp/deploy-dev.sh"
          gcloud compute ssh --tunnel-through-iap --zone="${{ vars.GCP_DEV_VM_ZONE }}" "${{ vars.GCP_DEV_VM_NAME }}" \
            --command="bash /tmp/deploy-dev.sh && rm /tmp/deploy-dev.sh"

  # deploy-staging, drain-hook verification, and the E2E smoke check are one
  # job, not three: each GitHub Actions job runs on its own fresh runner VM,
  # and the ephemeral kind cluster created here only exists as containers on
  # THIS runner. A later job has no way to reach it — it would need its own
  # kubeconfig/cluster that was never created, which is exactly the bug this
  # consolidation fixes (previously split into deploy-staging/verify-drain-hook/
  # e2e-staging, each on a different machine with no shared cluster).
  deploy-staging:
    needs: [db-migration-staging, resolve-registry]
    runs-on: ubuntu-latest
    # Same manual-approval gate deploy-production already uses (environment:
    # {name: production} below) — a required-reviewers protection rule on
    # the "staging" GitHub Environment (Settings → Environments → staging),
    # not something expressible in this file itself.
    environment:
      name: staging
    permissions:
      contents: read
      packages: read
      id-token: write # for the AWS/GCP auth steps below — unused (no-op) unless vars.CLOUD_PROVIDER is set
    steps:
      - uses: actions/checkout@v7.0.0
      # Exactly one of these three auth blocks actually runs, keyed off the
      # same vars.CLOUD_PROVIDER resolve-registry used to compute image_prefix.
      - uses: docker/login-action@v4.4.0
        if: vars.CLOUD_PROVIDER != 'aws' && vars.CLOUD_PROVIDER != 'gcp'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Log in to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        run: aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "${{ vars.AWS_ECR_REGISTRY }}"
      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}
      - name: Log in to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        run: gcloud auth configure-docker "$(echo '${{ vars.GCP_ARTIFACT_REGISTRY_URL }}' | cut -d/ -f1)" --quiet
      - name: Pull the just-scanned images
        # mt-terminal-image isn't its own deployed service (no
        # deploy/base/mt-terminal-image/ — it's a base image mt-terminal-host's
        # reconciler references per-broker-account, see the TERMINAL_IMAGE patch
        # step below), but still pulled/kind-loaded here so it's available
        # locally if this environment's smoke test ever provisions a real
        # terminal pod.
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host mt-terminal-image admin-portal web; do
            docker pull ${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}
          done
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: nectrix-staging
      - name: Load images into kind (no registry pull needed inside the cluster)
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host mt-terminal-image admin-portal web; do
            kind load docker-image "${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}" --name nectrix-staging
          done
      - name: Install kustomize
        run: |
          mkdir -p /tmp/kustomize-bin
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.1 /tmp/kustomize-bin
          echo "/tmp/kustomize-bin" >> "$GITHUB_PATH"
      - name: Patch image tags into the staging overlay
        # Explicit oldName=newName:tag form (not the single-arg shorthand) —
        # required whenever the resolved registry differs from the
        # ghcr.io/avison9/nectrix hardcoded in deploy/base/*/deployment.yaml,
        # which is the case once vars.CLOUD_PROVIDER is aws or gcp.
        #
        # mt-terminal-image deliberately excluded from this loop — kustomize's
        # `set image` only rewrites container `image:` fields in Deployment
        # specs, and mt-terminal-image has no Deployment of its own (see above).
        # It's referenced instead as the TERMINAL_IMAGE env var value on
        # mt-terminal-host's own Deployment, patched separately below since
        # kustomize's image-set mechanism doesn't reach into env var strings.
        working-directory: deploy/overlays/staging
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal web; do
            kustomize edit set image "ghcr.io/avison9/nectrix/$app=${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}"
          done
      - name: Patch TERMINAL_IMAGE env var into mt-terminal-host's base Deployment
        # deploy/base/mt-terminal-host/deployment.yaml ships with a
        # REPLACED_BY_CI sentinel for TERMINAL_IMAGE (same convention as its
        # own `image:` field, which kustomize's set-image step above handles) —
        # but that's an env var VALUE, not a container image field, so it needs
        # a direct substitution instead. Mutates the checked-out base file
        # in-place, same as kustomize's own edits above; this runner and its
        # checkout are thrown away at the end of this ephemeral job.
        run: |
          sed -i "s|ghcr.io/avison9/nectrix/mt-terminal-image:REPLACED_BY_CI|${{ needs.resolve-registry.outputs.image_prefix }}/mt-terminal-image:${{ github.sha }}|" deploy/base/mt-terminal-host/deployment.yaml
      # TICKET-005 — core-app's Deployment reads JWT_SIGNING_SECRET from this
      # Secret (see deploy/base/core-app/deployment.yaml); it's read eagerly
      # at startup regardless of whether auth is ever exercised, so without
      # this the pod crash-loops and "Wait for rollouts" times out. Namespace
      # is created idempotently first since `kubectl apply -k` (which
      # normally creates it) hasn't run yet at this point. Same throwaway
      # value as the integration-test job's env — not a real secret.
      - name: Create core-app/admin-portal namespaces + throwaway auth secrets
        # admin-portal's proxy.ts verifies JWTs with the same secret core-app
        # signs with (see lib/session.ts) — same throwaway value, duplicated
        # into a Secret in admin-portal's own namespace since Secrets are
        # namespace-scoped and admin-portal doesn't share core-app's.
        #
        # TICKET-101 — broker-adapters-secrets/core-app-secrets' internal-
        # service-token must be byte-for-byte identical (both sides
        # authenticate to each other's internal endpoints with it); ctrader-
        # client-id/secret are throwaway placeholders — broker-adapters'
        # main.go fails fast if they're unset at all (crash-loops without
        # them), but this ephemeral kind cluster only proves rollout/health,
        # never a real cTrader connection, so a real value isn't needed.
        run: |
          kubectl create namespace core-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic core-app-secrets -n core-app \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace admin-portal --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic admin-portal-secrets -n admin-portal \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          # TICKET-110 — apps/web needs the same JWT-verification secret
          # admin-portal/core-app do, in its own namespace (Secrets are
          # namespace-scoped).
          kubectl create namespace web --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic web-secrets -n web \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace copy-engine --dry-run=client -o yaml | kubectl apply -f -
          # TICKET-106 — copy-engine's own main.go now log.Fatalf's without
          # INTERNAL_SERVICE_TOKEN too (it calls broker-adapters'/
          # mt5-bridge-gateway's new internal routes using it), same
          # byte-for-byte-identical throwaway value as every other service.
          kubectl create secret generic copy-engine-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic broker-adapters-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=ctrader-client-id="ephemeral-ci-placeholder-client-id" \
            --from-literal=ctrader-client-secret="ephemeral-ci-placeholder-client-secret" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Real, live-verified finding: mt5-bridge-gateway's main.go
          # log.Fatalf's without INTERNAL_SERVICE_TOKEN — a genuine
          # deploy-staging rollout timeout caught this the first time this
          # Deployment was ever actually applied. Same throwaway value as
          # every other service's internal-service-token (must be
          # byte-for-byte identical — see deploy/base/mt5-bridge-gateway/
          # deployment.yaml's own comment).
          kubectl create secret generic mt5-bridge-gateway-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Nectrix-hosted MT5/MT4 terminals — mt-terminal-provisioner-token
          # is deliberately a DIFFERENT throwaway value from
          # internal-service-token above (see SecurityConfig's Javadoc for
          # why these are separate secrets in real deployments too).
          # mt-terminals namespace + the RBAC objects are applied here,
          # BEFORE the main `kubectl apply -k` below, so the ServiceAccount
          # mt-terminal-host's Deployment references already exists by the
          # time that Deployment is created.
          kubectl create namespace mt-terminals --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/base/mt-terminal-host/serviceaccount.yaml
          kubectl apply -f deploy/base/mt-terminal-host/role.yaml
          kubectl apply -f deploy/base/mt-terminal-host/rolebinding.yaml
          kubectl create secret generic mt-terminal-host-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
      - run: kubectl apply -k deploy/overlays/staging
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=120s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt5-bridge-gateway -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt-terminal-host -n copy-engine --timeout=120s
          kubectl rollout status deployment/core-app -n core-app --timeout=180s
          kubectl rollout status deployment/admin-portal -n admin-portal --timeout=120s
      - name: Verify drain hook - static assertion (terminationGracePeriodSeconds is set)
        run: |
          for dep in copy-engine broker-adapters; do
            GRACE=$(kubectl get deployment "$dep" -n copy-engine -o jsonpath='{.spec.template.spec.terminationGracePeriodSeconds}')
            [ "$GRACE" = "30" ] || { echo "::error::$dep: terminationGracePeriodSeconds not set as expected (got '$GRACE')"; exit 1; }
          done
      - name: Verify drain hook - behavioral assertion (copy-engine)
        run: |
          # Polling `kubectl logs` synchronously after delete races against
          # kind/containerd tearing the pod down on the GitHub Actions runner
          # (confirmed: the image itself responds to SIGTERM instantly when
          # tested directly with `docker kill`; this is specifically about
          # capturing that output through kubectl against a terminating pod
          # in this environment) — stream logs to a file continuously
          # *before* deleting instead, which keeps whatever was written up to
          # whenever the connection actually breaks.
          POD=$(kubectl get pod -n copy-engine -l app=copy-engine -o jsonpath='{.items[0].metadata.name}')
          kubectl logs -f "$POD" -n copy-engine > /tmp/copy-engine-drain.log 2>&1 &
          LOGPID=$!
          sleep 1
          kubectl delete pod "$POD" -n copy-engine --wait=false
          sleep 20
          kill "$LOGPID" 2>/dev/null || true
          if ! grep -q "copy-engine draining" /tmp/copy-engine-drain.log; then
            echo "::error::copy-engine drain log did not fire within 20s"
            cat /tmp/copy-engine-drain.log || true
            exit 1
          fi
      - name: Verify drain hook - behavioral assertion (broker-adapters)
        run: |
          POD=$(kubectl get pod -n copy-engine -l app=broker-adapters -o jsonpath='{.items[0].metadata.name}')
          kubectl logs -f "$POD" -n copy-engine > /tmp/broker-adapters-drain.log 2>&1 &
          LOGPID=$!
          sleep 1
          kubectl delete pod "$POD" -n copy-engine --wait=false
          sleep 20
          kill "$LOGPID" 2>/dev/null || true
          if ! grep -q "broker-adapters draining" /tmp/broker-adapters-drain.log; then
            echo "::error::broker-adapters drain log did not fire within 20s"
            cat /tmp/broker-adapters-drain.log || true
            exit 1
          fi
      - name: Wait for replacement pods to be healthy again
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=60s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=60s
      - name: E2E smoke check (core-app, copy-engine, admin-portal)
        run: |
          kubectl port-forward -n copy-engine svc/copy-engine 18090:8090 &
          kubectl port-forward -n core-app svc/core-app 18080:8080 &
          kubectl port-forward -n admin-portal svc/admin-portal 18081:8080 &
          sleep 3
          curl --fail --retry 5 --retry-delay 2 http://localhost:18090/healthz
          curl --fail --retry 5 --retry-delay 2 http://localhost:18080/hello
          # /login is admin-portal's one public route (proxy.ts redirects
          # everything else to it) — 200 here proves the real Next.js server
          # started, not just that the container is Running.
          curl --fail --retry 5 --retry-delay 2 http://localhost:18081/login
      - name: Teardown staging kind cluster
        if: always()
        run: kind delete cluster --name nectrix-staging

  db-migration-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::The migration framework now exists (TICKET-004, apps/core-app/db, Liquibase),"
          echo "but there is no real, persistent production Postgres yet - TICKET-003 deliberately"
          echo "never applied real cloud infrastructure. Once one exists, this becomes"
          echo "./gradlew :db:update against the real production DATABASE_URL."

  deploy-production:
    needs: [db-migration-production, resolve-registry]
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      packages: read
      id-token: write # for the AWS/GCP auth steps below — unused (no-op) unless vars.CLOUD_PROVIDER is set
    steps:
      - uses: actions/checkout@v7.0.0
      # Exactly one of these three auth blocks actually runs, keyed off the
      # same vars.CLOUD_PROVIDER resolve-registry used to compute image_prefix.
      - uses: docker/login-action@v4.4.0
        if: vars.CLOUD_PROVIDER != 'aws' && vars.CLOUD_PROVIDER != 'gcp'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Log in to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        run: aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "${{ vars.AWS_ECR_REGISTRY }}"
      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}
      - name: Log in to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        run: gcloud auth configure-docker "$(echo '${{ vars.GCP_ARTIFACT_REGISTRY_URL }}' | cut -d/ -f1)" --quiet
      - name: Pull the just-scanned images
        # mt-terminal-image isn't its own deployed service — see
        # deploy-staging's identical note.
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host mt-terminal-image admin-portal web; do
            docker pull ${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}
          done
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: nectrix-production
      - name: Load images into kind (no registry pull needed inside the cluster)
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host mt-terminal-image admin-portal web; do
            kind load docker-image "${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}" --name nectrix-production
          done
      - name: Install kustomize
        run: |
          mkdir -p /tmp/kustomize-bin
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.1 /tmp/kustomize-bin
          echo "/tmp/kustomize-bin" >> "$GITHUB_PATH"
      - name: Patch image tags into the production overlay
        # Explicit oldName=newName:tag form — see deploy-staging's identical note.
        # mt-terminal-image deliberately excluded — see deploy-staging's
        # identical note (patched via TERMINAL_IMAGE env var below instead).
        working-directory: deploy/overlays/production
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal web; do
            kustomize edit set image "ghcr.io/avison9/nectrix/$app=${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}"
          done
      - name: Patch TERMINAL_IMAGE env var into mt-terminal-host's base Deployment
        # See deploy-staging's identical step for why this exists.
        run: |
          sed -i "s|ghcr.io/avison9/nectrix/mt-terminal-image:REPLACED_BY_CI|${{ needs.resolve-registry.outputs.image_prefix }}/mt-terminal-image:${{ github.sha }}|" deploy/base/mt-terminal-host/deployment.yaml
      # TICKET-005 — see deploy-staging's identical step for why this exists.
      # Real production secret-management doesn't exist yet (out of scope
      # here — see infra/terraform/README.md); this ephemeral kind cluster
      # only proves rollout/health, so throwaway values are fine.
      - name: Create core-app/admin-portal namespaces + throwaway auth secrets
        # See deploy-staging's identical step for why admin-portal needs its
        # own copy of this secret (Secrets are namespace-scoped), and for why
        # TICKET-101 adds broker-adapters-secrets/internal-service-token.
        run: |
          kubectl create namespace core-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic core-app-secrets -n core-app \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace admin-portal --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic admin-portal-secrets -n admin-portal \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          # TICKET-110 — apps/web needs the same JWT-verification secret
          # admin-portal/core-app do, in its own namespace (Secrets are
          # namespace-scoped).
          kubectl create namespace web --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic web-secrets -n web \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace copy-engine --dry-run=client -o yaml | kubectl apply -f -
          # See deploy-staging's identical step for why copy-engine-secrets
          # exists (TICKET-106).
          kubectl create secret generic copy-engine-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic broker-adapters-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=ctrader-client-id="ephemeral-ci-placeholder-client-id" \
            --from-literal=ctrader-client-secret="ephemeral-ci-placeholder-client-secret" \
            --dry-run=client -o yaml | kubectl apply -f -
          # See deploy-staging's identical step for why this exists.
          kubectl create secret generic mt5-bridge-gateway-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Nectrix-hosted MT5/MT4 terminals — mt-terminal-provisioner-token
          # is deliberately a DIFFERENT throwaway value from
          # internal-service-token above (see SecurityConfig's Javadoc for
          # why these are separate secrets in real deployments too).
          # mt-terminals namespace + the RBAC objects are applied here,
          # BEFORE the main `kubectl apply -k` below, so the ServiceAccount
          # mt-terminal-host's Deployment references already exists by the
          # time that Deployment is created.
          kubectl create namespace mt-terminals --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/base/mt-terminal-host/serviceaccount.yaml
          kubectl apply -f deploy/base/mt-terminal-host/role.yaml
          kubectl apply -f deploy/base/mt-terminal-host/rolebinding.yaml
          kubectl create secret generic mt-terminal-host-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
      - run: kubectl apply -k deploy/overlays/production
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=120s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt5-bridge-gateway -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt-terminal-host -n copy-engine --timeout=120s
          kubectl rollout status deployment/core-app -n core-app --timeout=180s
          kubectl rollout status deployment/admin-portal -n admin-portal --timeout=120s
      - name: Smoke check
        run: |
          kubectl port-forward -n core-app svc/core-app 18080:8080 &
          kubectl port-forward -n admin-portal svc/admin-portal 18081:8080 &
          sleep 3
          curl --fail --retry 5 --retry-delay 2 http://localhost:18080/hello
          curl --fail --retry 5 --retry-delay 2 http://localhost:18081/login
      - name: Teardown production kind cluster
        if: always()
        run: kind delete cluster --name nectrix-production
