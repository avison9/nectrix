name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: avison9/nectrix

jobs:
  build-test:
    uses: ./.github/workflows/_build-test.yml
    with:
      run-core-app: true
      run-go-apps: true
      run-ts-apps: true

  integration-test:
    needs: [build-test]
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-throwaway-password
      POSTGRES_APP_PASSWORD: ci-throwaway-app-password
      MINIO_ROOT_PASSWORD: ci-throwaway-password
      # TICKET-005 — no default in application.yml (deliberately, so a forgotten
      # secret fails loudly in real environments), so CI needs its own throwaway
      # values. GOOGLE_OAUTH_*/APPLE_OAUTH_* are left unset — application.yml
      # defaults those to empty strings, and no test here exercises real OAuth.
      # JWT_SIGNING_SECRET must be valid base64 decoding to >=32 bytes
      # (JwtService's requirement) — freshly generated via `openssl rand
      # -base64 N`, not a secret reused anywhere real.
      JWT_SIGNING_SECRET: "n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ=="
      # TICKET-011 — LocalStack accepts any dummy AWS credentials; the SDK
      # only requires *something* resolvable (see AwsEnvelopeKmsClient).
      AWS_REGION: us-east-1
      KMS_ENDPOINT_OVERRIDE: http://localhost:4566
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Start ephemeral infra (Postgres, Redis, Kafka, LocalStack)
        run: docker compose -f docker-compose.yml up -d --wait postgres redis kafka localstack
      - name: Create Kafka topic catalog (TICKET-007)
        run: ./infra/kafka/create-topics.sh
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Run database migrations (TICKET-004)
        working-directory: apps/core-app
        run: ./gradlew :db:update
      - name: Create the envelope-encryption KMS key in LocalStack (TICKET-011)
        run: ./infra/localstack/init-kms.sh
      - name: core-app infra connectivity + schema/audit-log + auth (TICKET-005) + envelope-encryption (TICKET-011) integration tests
        working-directory: apps/core-app
        run: ./gradlew integrationTest
      - name: event-contracts/java Kafka producer/consumer + DLQ integration tests (TICKET-007)
        working-directory: packages/event-contracts/java
        run: ./gradlew integrationTest
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.4"
          # copy-engine/broker-adapters/mt5-bridge-gateway have no go.sum (no
          # external deps beyond stdlib and local go.work-linked packages);
          # event-contracts/go does have real external deps (TICKET-007) but
          # is a small, single additional module — not worth a separate cache
          # key for this loop.
          cache: false
      - name: Go services infra connectivity smoke test + event-contracts Kafka producer/consumer + DLQ tests (TICKET-007)
        # apps/mt-terminal-host is deliberately NOT in this loop: its own
        # -tags=integration tests need a real Kubernetes cluster (KUBECONFIG
        # pointed at one), not this job's Postgres/Redis/Kafka-only ephemeral
        # infra — proven separately, for real, via `make kind-mt-terminal-host-test`
        # (infra/kind/mt-terminal-host-test/run.sh), the same
        # host-tools-only pattern kind-netpol-test/kind-hpa-test already use
        # (see infra/kind/README.md) rather than wired into this job.
        run: |
          for d in apps/copy-engine apps/broker-adapters apps/mt5-bridge-gateway packages/event-contracts/go; do
            (cd "$d" && go test -tags=integration ./...)
          done
      - name: Tear down infra
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # Single source of truth for "which cloud, if any, is active" — resolves to
  # a real image-reference prefix deploy-staging/deploy-production actually
  # pull from. Defaults to GHCR when vars.CLOUD_PROVIDER is unset (today).
  # Kept as its own job (not duplicated inline) so build-scan-push's mirror
  # push and both deploy jobs all key off exactly one value, never two
  # independent checks that could both fire at once.
  resolve-registry:
    needs: [integration-test]
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.resolve.outputs.image_prefix }}
    steps:
      - id: resolve
        run: |
          case "${{ vars.CLOUD_PROVIDER }}" in
            aws) echo "image_prefix=${{ vars.AWS_ECR_REGISTRY }}/nectrix" >> "$GITHUB_OUTPUT" ;;
            gcp) echo "image_prefix=${{ vars.GCP_ARTIFACT_REGISTRY_URL }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "image_prefix=ghcr.io/avison9/nectrix" >> "$GITHUB_OUTPUT" ;;
          esac

  build-scan-push:
    needs: [integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for the ECR/Artifact Registry OIDC/WIF steps below — unused (no-op) until those repo variables exist
    strategy:
      # fail-fast (the default) cancels sibling matrix legs the instant one
      # leg fails, which was masking the real per-app error behind a generic
      # "operation was canceled" on every leg. Disabled so each app's
      # build/scan runs to real completion independently.
      fail-fast: false
      matrix:
        app:
          - { name: core-app, dockerfile: apps/core-app/Dockerfile }
          - { name: copy-engine, dockerfile: apps/copy-engine/Dockerfile }
          - { name: broker-adapters, dockerfile: apps/broker-adapters/Dockerfile }
          - { name: mt5-bridge-gateway, dockerfile: apps/mt5-bridge-gateway/Dockerfile }
          - { name: mt-terminal-host, dockerfile: apps/mt-terminal-host/Dockerfile }
          - { name: admin-portal, dockerfile: apps/admin-portal/Dockerfile }
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Push (only reached if Trivy passed)
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}

      # --- Cloud-native registry mirror (infra/terraform/{aws,gcp}/modules/{ecr,artifact-registry}) ---
      # Mutually exclusive on vars.CLOUD_PROVIDER (set once a cloud is chosen
      # for real — see infra/terraform/README.md's "Container registry"
      # section) — not two independent existence checks, so at most one of
      # these fires per run, never both. Unset today (no real cloud account
      # exists yet), so both are no-ops and this pipeline's status is
      # unaffected.
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Push to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }} # e.g. <account-id>.dkr.ecr.<region>.amazonaws.com — from the ecr module's repository_urls output
        run: |
          aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}" "$ECR_REGISTRY/nectrix/${{ matrix.app.name }}:${{ github.sha }}"
          docker push "$ECR_REGISTRY/nectrix/${{ matrix.app.name }}:${{ github.sha }}"

      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}

      - name: Push to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        env:
          AR_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_URL }} # e.g. <region>-docker.pkg.dev/<project>/nectrix — from the artifact-registry module's repository_url output
        run: |
          gcloud auth configure-docker "$(echo "$AR_REPOSITORY" | cut -d/ -f1)" --quiet
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app.name }}:${{ github.sha }}" "$AR_REPOSITORY/${{ matrix.app.name }}:${{ github.sha }}"
          docker push "$AR_REPOSITORY/${{ matrix.app.name }}:${{ github.sha }}"

  db-migration-staging:
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::The migration framework now exists (TICKET-004, apps/core-app/db, Liquibase)"
          echo "and is exercised for real in the integration-test job above, against the ephemeral"
          echo "CI Postgres. This stage is still a placeholder because there is no real, persistent"
          echo "staging Postgres to run against yet - TICKET-003 deliberately never applied real"
          echo "cloud infrastructure (see infra/terraform/README.md). Once one exists, this becomes"
          echo "./gradlew :db:update against the real staging DATABASE_URL, before the app"
          echo "deployment step below - per docs/16-deployment-architecture.md §16.3."

  # deploy-staging, drain-hook verification, and the E2E smoke check are one
  # job, not three: each GitHub Actions job runs on its own fresh runner VM,
  # and the ephemeral kind cluster created here only exists as containers on
  # THIS runner. A later job has no way to reach it — it would need its own
  # kubeconfig/cluster that was never created, which is exactly the bug this
  # consolidation fixes (previously split into deploy-staging/verify-drain-hook/
  # e2e-staging, each on a different machine with no shared cluster).
  deploy-staging:
    needs: [db-migration-staging, resolve-registry]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write # for the AWS/GCP auth steps below — unused (no-op) unless vars.CLOUD_PROVIDER is set
    steps:
      - uses: actions/checkout@v7.0.0
      # Exactly one of these three auth blocks actually runs, keyed off the
      # same vars.CLOUD_PROVIDER resolve-registry used to compute image_prefix.
      - uses: docker/login-action@v4.4.0
        if: vars.CLOUD_PROVIDER != 'aws' && vars.CLOUD_PROVIDER != 'gcp'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Log in to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        run: aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "${{ vars.AWS_ECR_REGISTRY }}"
      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}
      - name: Log in to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        run: gcloud auth configure-docker "$(echo '${{ vars.GCP_ARTIFACT_REGISTRY_URL }}' | cut -d/ -f1)" --quiet
      - name: Pull the just-scanned images
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            docker pull ${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}
          done
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: nectrix-staging
      - name: Load images into kind (no registry pull needed inside the cluster)
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            kind load docker-image "${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}" --name nectrix-staging
          done
      - name: Install kustomize
        run: |
          mkdir -p /tmp/kustomize-bin
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.1 /tmp/kustomize-bin
          echo "/tmp/kustomize-bin" >> "$GITHUB_PATH"
      - name: Patch image tags into the staging overlay
        # Explicit oldName=newName:tag form (not the single-arg shorthand) —
        # required whenever the resolved registry differs from the
        # ghcr.io/avison9/nectrix hardcoded in deploy/base/*/deployment.yaml,
        # which is the case once vars.CLOUD_PROVIDER is aws or gcp.
        working-directory: deploy/overlays/staging
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            kustomize edit set image "ghcr.io/avison9/nectrix/$app=${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}"
          done
      # TICKET-005 — core-app's Deployment reads JWT_SIGNING_SECRET from this
      # Secret (see deploy/base/core-app/deployment.yaml); it's read eagerly
      # at startup regardless of whether auth is ever exercised, so without
      # this the pod crash-loops and "Wait for rollouts" times out. Namespace
      # is created idempotently first since `kubectl apply -k` (which
      # normally creates it) hasn't run yet at this point. Same throwaway
      # value as the integration-test job's env — not a real secret.
      - name: Create core-app/admin-portal namespaces + throwaway auth secrets
        # admin-portal's proxy.ts verifies JWTs with the same secret core-app
        # signs with (see lib/session.ts) — same throwaway value, duplicated
        # into a Secret in admin-portal's own namespace since Secrets are
        # namespace-scoped and admin-portal doesn't share core-app's.
        #
        # TICKET-101 — broker-adapters-secrets/core-app-secrets' internal-
        # service-token must be byte-for-byte identical (both sides
        # authenticate to each other's internal endpoints with it); ctrader-
        # client-id/secret are throwaway placeholders — broker-adapters'
        # main.go fails fast if they're unset at all (crash-loops without
        # them), but this ephemeral kind cluster only proves rollout/health,
        # never a real cTrader connection, so a real value isn't needed.
        run: |
          kubectl create namespace core-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic core-app-secrets -n core-app \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace admin-portal --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic admin-portal-secrets -n admin-portal \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace copy-engine --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic broker-adapters-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=ctrader-client-id="ephemeral-ci-placeholder-client-id" \
            --from-literal=ctrader-client-secret="ephemeral-ci-placeholder-client-secret" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Nectrix-hosted MT5/MT4 terminals — mt-terminal-provisioner-token
          # is deliberately a DIFFERENT throwaway value from
          # internal-service-token above (see SecurityConfig's Javadoc for
          # why these are separate secrets in real deployments too).
          # mt-terminals namespace + the RBAC objects are applied here,
          # BEFORE the main `kubectl apply -k` below, so the ServiceAccount
          # mt-terminal-host's Deployment references already exists by the
          # time that Deployment is created.
          kubectl create namespace mt-terminals --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/base/mt-terminal-host/serviceaccount.yaml
          kubectl apply -f deploy/base/mt-terminal-host/role.yaml
          kubectl apply -f deploy/base/mt-terminal-host/rolebinding.yaml
          kubectl create secret generic mt-terminal-host-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
      - run: kubectl apply -k deploy/overlays/staging
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=120s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt5-bridge-gateway -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt-terminal-host -n copy-engine --timeout=120s
          kubectl rollout status deployment/core-app -n core-app --timeout=180s
          kubectl rollout status deployment/admin-portal -n admin-portal --timeout=120s
      - name: Verify drain hook - static assertion (terminationGracePeriodSeconds is set)
        run: |
          for dep in copy-engine broker-adapters; do
            GRACE=$(kubectl get deployment "$dep" -n copy-engine -o jsonpath='{.spec.template.spec.terminationGracePeriodSeconds}')
            [ "$GRACE" = "30" ] || { echo "::error::$dep: terminationGracePeriodSeconds not set as expected (got '$GRACE')"; exit 1; }
          done
      - name: Verify drain hook - behavioral assertion (copy-engine)
        run: |
          # Polling `kubectl logs` synchronously after delete races against
          # kind/containerd tearing the pod down on the GitHub Actions runner
          # (confirmed: the image itself responds to SIGTERM instantly when
          # tested directly with `docker kill`; this is specifically about
          # capturing that output through kubectl against a terminating pod
          # in this environment) — stream logs to a file continuously
          # *before* deleting instead, which keeps whatever was written up to
          # whenever the connection actually breaks.
          POD=$(kubectl get pod -n copy-engine -l app=copy-engine -o jsonpath='{.items[0].metadata.name}')
          kubectl logs -f "$POD" -n copy-engine > /tmp/copy-engine-drain.log 2>&1 &
          LOGPID=$!
          sleep 1
          kubectl delete pod "$POD" -n copy-engine --wait=false
          sleep 20
          kill "$LOGPID" 2>/dev/null || true
          if ! grep -q "copy-engine draining" /tmp/copy-engine-drain.log; then
            echo "::error::copy-engine drain log did not fire within 20s"
            cat /tmp/copy-engine-drain.log || true
            exit 1
          fi
      - name: Verify drain hook - behavioral assertion (broker-adapters)
        run: |
          POD=$(kubectl get pod -n copy-engine -l app=broker-adapters -o jsonpath='{.items[0].metadata.name}')
          kubectl logs -f "$POD" -n copy-engine > /tmp/broker-adapters-drain.log 2>&1 &
          LOGPID=$!
          sleep 1
          kubectl delete pod "$POD" -n copy-engine --wait=false
          sleep 20
          kill "$LOGPID" 2>/dev/null || true
          if ! grep -q "broker-adapters draining" /tmp/broker-adapters-drain.log; then
            echo "::error::broker-adapters drain log did not fire within 20s"
            cat /tmp/broker-adapters-drain.log || true
            exit 1
          fi
      - name: Wait for replacement pods to be healthy again
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=60s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=60s
      - name: E2E smoke check (core-app, copy-engine, admin-portal)
        run: |
          kubectl port-forward -n copy-engine svc/copy-engine 18090:8090 &
          kubectl port-forward -n core-app svc/core-app 18080:8080 &
          kubectl port-forward -n admin-portal svc/admin-portal 18081:8080 &
          sleep 3
          curl --fail --retry 5 --retry-delay 2 http://localhost:18090/healthz
          curl --fail --retry 5 --retry-delay 2 http://localhost:18080/hello
          # /login is admin-portal's one public route (proxy.ts redirects
          # everything else to it) — 200 here proves the real Next.js server
          # started, not just that the container is Running.
          curl --fail --retry 5 --retry-delay 2 http://localhost:18081/login
      - name: Teardown staging kind cluster
        if: always()
        run: kind delete cluster --name nectrix-staging

  db-migration-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::The migration framework now exists (TICKET-004, apps/core-app/db, Liquibase),"
          echo "but there is no real, persistent production Postgres yet - TICKET-003 deliberately"
          echo "never applied real cloud infrastructure. Once one exists, this becomes"
          echo "./gradlew :db:update against the real production DATABASE_URL."

  deploy-production:
    needs: [db-migration-production, resolve-registry]
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      packages: read
      id-token: write # for the AWS/GCP auth steps below — unused (no-op) unless vars.CLOUD_PROVIDER is set
    steps:
      - uses: actions/checkout@v7.0.0
      # Exactly one of these three auth blocks actually runs, keyed off the
      # same vars.CLOUD_PROVIDER resolve-registry used to compute image_prefix.
      - uses: docker/login-action@v4.4.0
        if: vars.CLOUD_PROVIDER != 'aws' && vars.CLOUD_PROVIDER != 'gcp'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials (OIDC, no long-lived keys)
        if: vars.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Log in to ECR
        if: vars.CLOUD_PROVIDER == 'aws'
        run: aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | docker login --username AWS --password-stdin "${{ vars.AWS_ECR_REGISTRY }}"
      - name: Authenticate to GCP (Workload Identity Federation, no service-account key)
        if: vars.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SERVICE_ACCOUNT }}
      - name: Log in to Artifact Registry
        if: vars.CLOUD_PROVIDER == 'gcp'
        run: gcloud auth configure-docker "$(echo '${{ vars.GCP_ARTIFACT_REGISTRY_URL }}' | cut -d/ -f1)" --quiet
      - name: Pull the just-scanned images
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            docker pull ${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}
          done
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: nectrix-production
      - name: Load images into kind (no registry pull needed inside the cluster)
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            kind load docker-image "${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}" --name nectrix-production
          done
      - name: Install kustomize
        run: |
          mkdir -p /tmp/kustomize-bin
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.7.1 /tmp/kustomize-bin
          echo "/tmp/kustomize-bin" >> "$GITHUB_PATH"
      - name: Patch image tags into the production overlay
        # Explicit oldName=newName:tag form — see deploy-staging's identical note.
        working-directory: deploy/overlays/production
        run: |
          for app in core-app copy-engine broker-adapters mt5-bridge-gateway mt-terminal-host admin-portal; do
            kustomize edit set image "ghcr.io/avison9/nectrix/$app=${{ needs.resolve-registry.outputs.image_prefix }}/$app:${{ github.sha }}"
          done
      # TICKET-005 — see deploy-staging's identical step for why this exists.
      # Real production secret-management doesn't exist yet (out of scope
      # here — see infra/terraform/README.md); this ephemeral kind cluster
      # only proves rollout/health, so throwaway values are fine.
      - name: Create core-app/admin-portal namespaces + throwaway auth secrets
        # See deploy-staging's identical step for why admin-portal needs its
        # own copy of this secret (Secrets are namespace-scoped), and for why
        # TICKET-101 adds broker-adapters-secrets/internal-service-token.
        run: |
          kubectl create namespace core-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic core-app-secrets -n core-app \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace admin-portal --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic admin-portal-secrets -n admin-portal \
            --from-literal=jwt-signing-secret="n/ErCuickD7JyKdFhuOeH2QWJjQp6ZBxGxUosC6Mtr3kP6idy8j1sMYV0lKL0wAPeMuFQ4iwsF2uxq9lIk6MYQ==" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace copy-engine --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic broker-adapters-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=ctrader-client-id="ephemeral-ci-placeholder-client-id" \
            --from-literal=ctrader-client-secret="ephemeral-ci-placeholder-client-secret" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Nectrix-hosted MT5/MT4 terminals — mt-terminal-provisioner-token
          # is deliberately a DIFFERENT throwaway value from
          # internal-service-token above (see SecurityConfig's Javadoc for
          # why these are separate secrets in real deployments too).
          # mt-terminals namespace + the RBAC objects are applied here,
          # BEFORE the main `kubectl apply -k` below, so the ServiceAccount
          # mt-terminal-host's Deployment references already exists by the
          # time that Deployment is created.
          kubectl create namespace mt-terminals --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/base/mt-terminal-host/serviceaccount.yaml
          kubectl apply -f deploy/base/mt-terminal-host/role.yaml
          kubectl apply -f deploy/base/mt-terminal-host/rolebinding.yaml
          kubectl create secret generic mt-terminal-host-secrets -n copy-engine \
            --from-literal=internal-service-token="ephemeral-ci-internal-token-DNRSbAWNZeVoRUcQyzuFtWnk" \
            --from-literal=mt-terminal-provisioner-token="ephemeral-ci-terminal-provisioner-token-XvJhq2NpTr8FbGdKz" \
            --dry-run=client -o yaml | kubectl apply -f -
      - run: kubectl apply -k deploy/overlays/production
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/copy-engine -n copy-engine --timeout=120s
          kubectl rollout status deployment/broker-adapters -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt5-bridge-gateway -n copy-engine --timeout=120s
          kubectl rollout status deployment/mt-terminal-host -n copy-engine --timeout=120s
          kubectl rollout status deployment/core-app -n core-app --timeout=180s
          kubectl rollout status deployment/admin-portal -n admin-portal --timeout=120s
      - name: Smoke check
        run: |
          kubectl port-forward -n core-app svc/core-app 18080:8080 &
          kubectl port-forward -n admin-portal svc/admin-portal 18081:8080 &
          sleep 3
          curl --fail --retry 5 --retry-delay 2 http://localhost:18080/hello
          curl --fail --retry 5 --retry-delay 2 http://localhost:18081/login
      - name: Teardown production kind cluster
        if: always()
        run: kind delete cluster --name nectrix-production
