services:
  devcontainer:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      # POSTGRES_HOST/PORT are hardcoded to the compose-network values here —
      # NOT ${POSTGRES_PORT} from .env, which is only the *host* port mapping
      # (postgres/docker-compose.yml) and irrelevant from inside this network,
      # where the service is always reachable as `postgres:5432`. Used by
      # apps/core-app/db (Liquibase) and bootstrap's application.yml.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-nectrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?Set POSTGRES_APP_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-nectrix}
      # Same in-network-vs-host-mapping reasoning as POSTGRES_HOST/PORT above.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Kafka's internal PLAINTEXT listener (docker-compose.yml's
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092), NOT the 9092
      # EXTERNAL listener — that one is advertised as localhost:9092, which
      # only resolves correctly for a client connecting from the host.
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      # --- Auth (TICKET-005) ---
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET:?Set JWT_SIGNING_SECRET in your .env file}
      # OAuth vars are allowed to be blank (Google/Apple login just won't work
      # until real credentials are set) — not required to boot the app.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      APPLE_OAUTH_CLIENT_ID: ${APPLE_OAUTH_CLIENT_ID:-}
      APPLE_OAUTH_CLIENT_SECRET: ${APPLE_OAUTH_CLIENT_SECRET:-}
      # --- Envelope encryption (TICKET-011) ---
      # In-network LocalStack endpoint — NOT ${LOCALSTACK_PORT} from .env
      # (that's only the host port mapping), same in-network-vs-host-mapping
      # reasoning as POSTGRES_HOST/PORT above. Real AWS KMS in production
      # never sets KMS_ENDPOINT_OVERRIDE at all.
      AWS_REGION: us-east-1
      KMS_ENDPOINT_OVERRIDE: http://localstack:4566
      # --- Broker account archival (TICKET-101 follow-up) ---
      # Same in-network-vs-host-mapping reasoning as KMS_ENDPOINT_OVERRIDE above — real
      # production blob storage never sets ARCHIVAL_ENDPOINT_OVERRIDE at all.
      ARCHIVAL_BUCKET: ${ARCHIVAL_BUCKET:-nectrix-archival}
      ARCHIVAL_ENDPOINT_OVERRIDE: http://minio:9000
      ARCHIVAL_ACCESS_KEY: ${MINIO_ROOT_USER:-nectrix}
      ARCHIVAL_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your .env file}
      ARCHIVAL_SWEEP_ENABLED: ${ARCHIVAL_SWEEP_ENABLED:-false}
      # --- Admin Portal (TICKET-012) ---
      # core-app runs as a plain `./gradlew bootRun` process inside this same
      # devcontainer (not its own compose service), reachable at its own
      # localhost:8080 — not an in-network service hostname like the vars
      # above. Real clusters set this to core-app's in-cluster Service DNS
      # instead (see deploy/base/admin-portal/deployment.yaml).
      CORE_APP_BASE_URL: http://localhost:8080
      # --- cTrader Broker Adapter (TICKET-101) ---
      # Blank allowed, same reasoning as the Google/Apple OAuth vars above —
      # the app boots fine without them, real broker linking just won't work
      # until you register a cTrader Open API app and set these.
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      TOKEN_REFRESH_ENABLED: ${TOKEN_REFRESH_ENABLED:-false}
      # apps/broker-adapters (Go) also runs as a plain process inside this same
      # devcontainer, reachable at its own localhost:8091 — same
      # not-an-in-network-hostname reasoning as CORE_APP_BASE_URL above.
      CORE_APP_INTERNAL_BASE_URL: http://localhost:8080
      BROKER_ADAPTERS_INTERNAL_BASE_URL: http://localhost:8091
      # --- Invitation System (TICKET-118) ---
      # webhook-catcher is the same dev-only HTTP stand-in TICKET-010 already uses for Slack
      # alerts — its own compose network hostname, same in-network reasoning as
      # POSTGRES_HOST/REDIS_HOST above. Never set in real deployments (see SesEmailSender's own
      # Javadoc) — this is purely so invitation emails' real links are visible locally without
      # real AWS SES credentials.
      LOCAL_EMAIL_CATCHER_URL: http://webhook-catcher:9099
    ports:
      - "8080:8080"   # core-app
      - "8090:8090"   # copy-engine
      - "8091:8091"   # broker-adapters
      - "8092:8092"   # mt5-bridge-gateway
      - "3000:3000"   # web
      - "3001:3001"   # admin-portal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      localstack:
        condition: service_healthy
