# Reference only — NOT applied by deploy/overlays/local's kustomization.yaml
# (avoids committing even a throwaway default credential, same reasoning as
# docker-compose.yml's `${VAR:?error}` no-defaults pattern). Before running
# `kubectl apply -k deploy/overlays/local`, create the real thing imperatively:
#
#   kubectl create secret generic minio-credentials -n platform \
#     --from-literal=MINIO_ROOT_USER=nectrix \
#     --from-literal=MINIO_ROOT_PASSWORD=<your-own-local-only-password>
#
# Same MINIO_ROOT_USER/MINIO_ROOT_PASSWORD names docker-compose.yml already uses.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: platform
stringData:
  MINIO_ROOT_USER: nectrix
  MINIO_ROOT_PASSWORD: changeme-local-only
