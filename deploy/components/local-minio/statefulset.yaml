# Local-dev/kind-only — real environments use Terraform-provisioned S3/GCS
# instead (infra/terraform/{aws,gcp}/modules/{s3-storage,gcs-storage}), per
# docs/13-technology-stack.md §13.2's guidance deliberately overridden for real
# clusters (see infra/terraform/README.md's "Object storage" section). This
# mirrors what docker-compose.yml already runs for local dev, just in-cluster
# for infra/kind testing.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: platform
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-11-07T00-52-20Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
