# k3s ships Traefik as a HelmChart-managed add-on; this HelmChartConfig
# (k3s's own CRD for overriding that chart's values without forking it)
# layers in a Let's Encrypt cert-resolver as the DEFAULT resolver on the
# websecure (443) entrypoint — every plain Ingress (deploy/base/*/ingress.yaml,
# no TLS-specific annotations needed) gets a real cert automatically. HTTP-01
# challenge needs port 80 reachable (see infra/terraform/gcp-dev's firewall
# rule), which the challenge uses transiently before redirecting to 443.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Real, live failure the first time this actually tried to issue a
      # cert: Let's Encrypt rejects account registration outright
      # ("invalidContact: unable to parse email address") on a literal
      # placeholder, not just a soft warning — this has to be a real,
      # validly-formatted address before ANY cert on this VM can issue,
      # not only a "nice to have" for renewal notices. admin@ on the domain
      # this Terraform module already manages DNS for; swap for a real
      # monitored address if you want renewal-failure notices to reach you.
      - "--certificatesresolvers.letsencrypt.acme.email=admin@nectrix.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
