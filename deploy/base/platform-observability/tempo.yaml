apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: tempo }
  template:
    metadata:
      labels: { app: tempo }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          args: ["-config.file=/etc/tempo/tempo.yml"]
          ports:
            - containerPort: 3200 # query API (Grafana datasource)
            - containerPort: 4317 # OTLP gRPC
            - containerPort: 4318 # OTLP HTTP
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: storage
              mountPath: /var/tempo
          readinessProbe:
            httpGet: { path: /ready, port: 3200 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: storage
          # Ephemeral — same "no real cluster to deploy into yet" boundary as
          # everything else in this directory (see deploy/README.md). A real
          # deployment would use a PersistentVolumeClaim here.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: platform
spec:
  selector: { app: tempo }
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
