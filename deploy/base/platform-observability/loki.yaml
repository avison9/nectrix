apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.0
          args: ["-config.file=/etc/loki/loki-config.yml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: storage
          # Ephemeral — same boundary as tempo.yaml's storage volume.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: platform
spec:
  selector: { app: loki }
  ports:
    - port: 3100
      targetPort: 3100
