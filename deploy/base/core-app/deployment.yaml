apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-app
  namespace: core-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: core-app }
  template:
    metadata:
      labels: { app: core-app }
    spec:
      containers:
        - name: core-app
          image: ghcr.io/avison9/nectrix/core-app:REPLACED_BY_CI
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # TICKET-005 — application.yml has no default (deliberately, same
            # fail-loudly reasoning as POSTGRES_APP_PASSWORD), and it's read
            # eagerly at bean construction (JwtService) regardless of whether
            # any auth endpoint is ever hit — unlike the datasource (Hikari
            # connects lazily), a missing/malformed value here crashes the
            # whole ApplicationContext at startup, not just auth requests.
            # The `core-app-secrets` Secret is created by CI (main-pipeline.yml's
            # deploy-staging/deploy-production jobs) with a throwaway value
            # before this manifest is applied — real environments provide it
            # via their own secret-management, once that exists (see
            # infra/terraform/README.md).
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef: { name: core-app-secrets, key: jwt-signing-secret }
            # TICKET-101 — shared secret Go (apps/broker-adapters) and Java
            # authenticate to each other's internal-only endpoints with (see
            # SecurityConfig#internalFilterChain). Unlike JWT_SIGNING_SECRET,
            # a missing value doesn't crash core-app at startup (Spring binds
            # it null and the filter just always-401s) — but real broker
            # linking needs it, so it's wired the same way. Same throwaway-
            # value-from-CI reasoning as above; must be byte-for-byte
            # identical to broker-adapters' own copy of this secret.
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef: { name: core-app-secrets, key: internal-service-token }
            # CTRADER_CLIENT_ID/SECRET are deliberately NOT wired here yet —
            # same precedent as GOOGLE_OAUTH_CLIENT_ID/SECRET above (not
            # present in this manifest either): application.yml tolerates a
            # blank value (real cTrader linking just won't work until a real
            # operator sets these via real secret-management, which doesn't
            # exist yet — see infra/terraform/README.md).
            - name: TOKEN_REFRESH_ENABLED
              value: "false"
            # apps/broker-adapters' in-cluster Service DNS (own namespace:
            # copy-engine — see deploy/base/broker-adapters/service.yaml).
            - name: BROKER_ADAPTERS_INTERNAL_BASE_URL
              value: http://broker-adapters.copy-engine.svc.cluster.local:8091
            # TICKET-011 — apps/core-app/modules/crypto's EnvelopeEncryptionService.
            # KMS_ENDPOINT_OVERRIDE is deliberately unset here (unlike
            # docker-compose.yml's LocalStack override) — a real cluster has
            # no LocalStack, so this resolves to real AWS KMS via the SDK's
            # normal credential chain (IRSA), same as AWS_REGION defaulting
            # via application.yml's ${AWS_REGION:us-east-1}.
            # TICKET-010 — read by the OTel javaagent (apps/core-app/Dockerfile).
            # Inert today: nothing currently applies this namespace for real
            # (see deploy/base/platform-observability), same "written but
            # never applied" precedent as infra/terraform.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.platform.svc.cluster.local:4318
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          # TICKET-010 — the OTel javaagent's class-instrumentation-at-load-time
          # work makes startup genuinely slower and CPU-hungrier than a bare
          # Spring Boot app, confirmed by directly reproducing deploy-staging's
          # real "Wait for rollouts" failure: under a contended 0.25 CPU share
          # (this Deployment's old cpu *request* of 100m, matching what a busy
          # shared CI runner would actually schedule) startup took ~55-80s,
          # well past the old livenessProbe's kill threshold (10s + 10s*3 ≈
          # 40s) — the pod was being killed and restarted before it ever
          # finished starting, an infinite loop "rollout status" never sees
          # converge. A startupProbe (readiness/liveness are not evaluated
          # until it succeeds once) with a generous budget fixes this without
          # slowing down failure detection once the app is actually running.
          startupProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 5
            failureThreshold: 30 # 150s startup budget
          readinessProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { cpu: 750m, memory: 768Mi }
