apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-app
  namespace: core-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: core-app }
  template:
    metadata:
      labels: { app: core-app }
    spec:
      containers:
        - name: core-app
          image: ghcr.io/avison9/nectrix/core-app:REPLACED_BY_CI
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # TICKET-005 — application.yml has no default for either (deliberately,
            # same fail-loudly reasoning as POSTGRES_APP_PASSWORD), and both are
            # read eagerly at bean construction (JwtService, StubAesGcmTwoFactorSecretCipher)
            # regardless of whether any auth endpoint is ever hit — unlike the
            # datasource (Hikari connects lazily), a missing/malformed value here
            # crashes the whole ApplicationContext at startup, not just auth
            # requests. The `core-app-secrets` Secret is created by CI
            # (main-pipeline.yml's deploy-staging/deploy-production jobs) with
            # throwaway values before this manifest is applied — real
            # environments provide it via their own secret-management, once
            # that exists (see infra/terraform/README.md).
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef: { name: core-app-secrets, key: jwt-signing-secret }
            - name: TWO_FACTOR_SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef: { name: core-app-secrets, key: two-factor-secret-encryption-key }
            # TICKET-010 — read by the OTel javaagent (apps/core-app/Dockerfile).
            # Inert today: nothing currently applies this namespace for real
            # (see deploy/base/platform-observability), same "written but
            # never applied" precedent as infra/terraform.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.platform.svc.cluster.local:4318
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          # TICKET-010 — the OTel javaagent's class-instrumentation-at-load-time
          # work makes startup genuinely slower and CPU-hungrier than a bare
          # Spring Boot app, confirmed by directly reproducing deploy-staging's
          # real "Wait for rollouts" failure: under a contended 0.25 CPU share
          # (this Deployment's old cpu *request* of 100m, matching what a busy
          # shared CI runner would actually schedule) startup took ~55-80s,
          # well past the old livenessProbe's kill threshold (10s + 10s*3 ≈
          # 40s) — the pod was being killed and restarted before it ever
          # finished starting, an infinite loop "rollout status" never sees
          # converge. A startupProbe (readiness/liveness are not evaluated
          # until it succeeds once) with a generous budget fixes this without
          # slowing down failure detection once the app is actually running.
          startupProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 5
            failureThreshold: 30 # 150s startup budget
          readinessProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /hello, port: 8080 }
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { cpu: 750m, memory: 768Mi }
