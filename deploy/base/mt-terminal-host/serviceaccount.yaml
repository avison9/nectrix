# The identity apps/mt-terminal-host's own Pod runs as — lives alongside
# broker-adapters/mt5-bridge-gateway in copy-engine, but the RBAC that
# actually matters (role.yaml/rolebinding.yaml) grants it access scoped to
# the SEPARATE mt-terminals namespace only, not its own.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mt-terminal-host
  namespace: copy-engine
