apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker-adapters
  namespace: copy-engine
spec:
  replicas: 1
  selector:
    matchLabels: { app: broker-adapters }
  template:
    metadata:
      labels: { app: broker-adapters }
    spec:
      # Connection-draining (AC5): the app's own SIGTERM handler (main.go)
      # logs "draining" and sleeps ~10s before shutting down its HTTP server —
      # this budget must stay comfortably under terminationGracePeriodSeconds.
      # No K8s-level preStop hook: distroless/static has no shell to exec
      # into, and exec-hook stdout isn't captured by `kubectl logs` anyway
      # (verified — there is no way to observe an exec preStop hook's output),
      # so the observable drain behavior lives entirely in the app's own logs.
      terminationGracePeriodSeconds: 30
      containers:
        - name: broker-adapters
          image: ghcr.io/avison9/nectrix/broker-adapters:REPLACED_BY_CI
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            # TICKET-101 — main.go log.Fatalf's on any of these three being
            # unset, so unlike core-app's own tolerant-of-blank config, a
            # missing value here crash-loops the pod outright. The
            # `broker-adapters-secrets` Secret is created by CI (main-
            # pipeline.yml's deploy-staging/deploy-production jobs) with
            # throwaway values before this manifest is applied — same
            # pattern as core-app-secrets (real secret-management doesn't
            # exist yet, see infra/terraform/README.md).
            # internal-service-token must be byte-for-byte identical to
            # core-app's own copy (deploy/base/core-app/deployment.yaml).
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef: { name: broker-adapters-secrets, key: internal-service-token }
            - name: CTRADER_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: broker-adapters-secrets, key: ctrader-client-id }
            - name: CTRADER_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: broker-adapters-secrets, key: ctrader-client-secret }
            # core-app's in-cluster Service DNS (own namespace: core-app —
            # see deploy/base/core-app/service.yaml).
            - name: CORE_APP_INTERNAL_BASE_URL
              value: http://core-app.core-app.svc.cluster.local:8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
          readinessProbe:
            httpGet: { path: /healthz, port: 8091 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8091 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
