apiVersion: apps/v1
kind: Deployment
metadata:
  name: copy-engine
  namespace: copy-engine
spec:
  replicas: 1
  selector:
    matchLabels: { app: copy-engine }
  template:
    metadata:
      labels: { app: copy-engine }
    spec:
      # Connection-draining (AC5): the app's own SIGTERM handler (main.go)
      # logs "draining" and sleeps ~10s before shutting down its HTTP server —
      # this budget must stay comfortably under terminationGracePeriodSeconds.
      # No K8s-level preStop hook: distroless/static has no shell to exec
      # into, and exec-hook stdout isn't captured by `kubectl logs` anyway
      # (verified — there is no way to observe an exec preStop hook's output),
      # so the observable drain behavior lives entirely in the app's own logs.
      terminationGracePeriodSeconds: 30
      containers:
        - name: copy-engine
          image: ghcr.io/avison9/nectrix/copy-engine:REPLACED_BY_CI
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            # TICKET-010 — read by internal/observability.Init in main.go.
            # Inert today: nothing currently applies this namespace for real
            # (see deploy/base/platform-observability), same "written but
            # never applied" precedent as infra/terraform.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.platform.svc.cluster.local:4318
            # TICKET-106 — main.go log.Fatalf's without this (same
            # fail-fast pattern as broker-adapters'/mt5-bridge-gateway's own
            # copy — see those services' deployment.yaml comments). Must be
            # byte-for-byte identical to every other service's
            # internal-service-token: this is what authenticates copy-engine
            # to broker-adapters'/mt5-bridge-gateway's new internal
            # PlaceOrder/GetAccountSnapshot routes below.
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef: { name: copy-engine-secrets, key: internal-service-token }
            # broker-adapters'/mt5-bridge-gateway's in-cluster Service DNS —
            # both live in this same copy-engine namespace (see
            # deploy/base/broker-adapters/service.yaml,
            # deploy/base/mt5-bridge-gateway/service.yaml).
            - name: BROKER_ADAPTERS_INTERNAL_BASE_URL
              value: http://broker-adapters.copy-engine.svc.cluster.local:8091
            - name: MT5_BRIDGE_GATEWAY_INTERNAL_BASE_URL
              value: http://mt5-bridge-gateway.copy-engine.svc.cluster.local:8092
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
