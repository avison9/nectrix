# Namespace layout per nectrix_plan/docs/16-deployment-architecture.md §16.1/16.2.
# Only core-app and copy-engine have workloads in this ticket (TICKET-002) —
# the rest are declared now so the namespace layout matches the intended
# architecture from day one, ready for later tickets to populate.
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
---
apiVersion: v1
kind: Namespace
metadata:
  name: admin-portal
---
apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: v1
kind: Namespace
metadata:
  name: core-app
---
apiVersion: v1
kind: Namespace
metadata:
  name: copy-engine
---
apiVersion: v1
kind: Namespace
metadata:
  name: async
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
# Nectrix-hosted MT5/MT4 terminals (Wine + Xvfb + real terminal + EA), one
# Deployment+Secret per broker_accounts row, provisioned by
# apps/mt-terminal-host (whose own ServiceAccount lives in copy-engine — see
# deploy/base/mt-terminal-host/role.yaml for the RBAC scoping this
# namespace boundary enforces). Deliberately separate from copy-engine: these
# pods hold real plaintext broker credentials, a materially different blast
# radius than anything else in that namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: mt-terminals
