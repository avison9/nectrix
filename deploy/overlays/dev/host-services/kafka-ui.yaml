# kafka-ui isn't a k8s Deployment — it's a docker-compose container on this
# same VM (network_mode: host), fronted here the same no-selector-Service way
# postgres.yaml is, but ALSO given a public Ingress since (unlike Postgres)
# it's meant to be browsed directly at kafka-ui.dev.nectrix.dev.
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: host-services
spec:
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-ui
  namespace: host-services
subsets:
  - addresses:
      - ip: NODE_INTERNAL_IP_REPLACED_BY_CI
    ports:
      - port: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka-ui
  namespace: host-services
spec:
  rules:
    - host: kafka-ui.dev.nectrix.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8081
