# A Service with no selector + a hand-managed Endpoints object — the
# documented Kubernetes pattern for routing in-cluster traffic to something
# that isn't a pod (here: the docker-compose Postgres container running with
# network_mode: host on this same VM, see infra/overlays/dev's own
# docker-compose file). NODE_INTERNAL_IP_REPLACED_BY_CI is substituted by
# deploy-dev (main-pipeline.yml) with infra/terraform/gcp-dev's real
# vm_internal_ip output, same REPLACED_BY_CI sentinel convention
# deploy/base/mt-terminal-host/deployment.yaml uses for TERMINAL_IMAGE.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: host-services
spec:
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres
  namespace: host-services
subsets:
  - addresses:
      - ip: NODE_INTERNAL_IP_REPLACED_BY_CI
    ports:
      - port: 5432
