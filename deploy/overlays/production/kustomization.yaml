apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# One-line change once a real cloud is chosen for production (see
# infra/terraform/README.md) — e.g. components: [../../components/cloud-aws]
components: []
# `kustomize edit set image ghcr.io/avison9/nectrix/<app>:<sha>` (run by CI
# from this directory) appends/updates entries here at deploy time.
images: []
# Layers live-broker egress access on top of deploy/base/copy-engine's
# demo-only default — the only difference from ../staging's network posture.
patches:
  - target:
      kind: NetworkPolicy
      name: broker-egress
    path: patch-network-policy-live-allowed.yaml
